<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阶段学习 · 手语星球</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ── reset & variables ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --page: #f5f3f0;
            --card: #ffffff;
            --card-edge: rgba(0,0,0,0.05);
            --text: #1a1720;
            --text-secondary: #6c6878;
            --text-muted: #a8a3b0;
            --blue: #4f85e6;
            --blue-soft: #f0f4fe;
            --green: #3b9e72;
            --green-soft: #edf8f2;
            --amber: #c89030;
            --amber-bg: #fdf6e8;
            --radius: 10px;
            --shadow: 0 1px 2px rgba(0,0,0,0.03), 0 2px 12px rgba(0,0,0,0.02);
        }
        body {
            font-family: "Noto Sans SC", -apple-system, sans-serif;
            background: var(--page);
            color: var(--text);
            min-height: 100vh;
            font-size: 13px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding-top: 72px;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: radial-gradient(rgba(79,133,230,0.035) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        /* ── scrollbar ── */
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d5d0c8; border-radius: 3px; }

        /* ── buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 7px 18px;
            border: none;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 600;
            font-family: "Noto Sans SC", sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            letter-spacing: 0.01em;
        }
        .btn-primary {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 1px 4px rgba(79,133,230,0.15);
        }
        .btn-primary:hover {
            background: #3d72d4;
            box-shadow: 0 2px 12px rgba(79,133,230,0.2);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #f0efea;
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            background: #e6e5de;
        }
        .btn-sm {
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--card-edge);
            background: var(--card);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: "Noto Sans SC", sans-serif;
        }
        .btn-sm:hover {
            background: #f0efea;
            border-color: #c8c4bd;
        }

        /* ── nav ── */
        .nav-bar {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: calc(100% - 32px);
            max-width: 1020px;
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 16px;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 40px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.02);
        }
        .nav-home {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            font-family: "Noto Sans SC", sans-serif;
        }
        .nav-home .dot {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #fff;
        }
        .nav-home .sub {
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 1px;
        }
        .nav-links {
            display: flex;
            gap: 1px;
        }
        .nav-links a {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            font-family: "Noto Sans SC", sans-serif;
        }
        .nav-links a:hover {
            color: var(--text);
            background: rgba(0,0,0,0.02);
        }
        .nav-links a.active {
            color: var(--blue);
            background: var(--blue-soft);
        }
        .nav-links a i {
            font-size: 12px;
            opacity: 0.5;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .nav-right .usr-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(0,0,0,0.03);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 13px;
        }
        .nav-right .usr-btn:hover {
            background: rgba(0,0,0,0.06);
            color: var(--text);
        }

        /* auth dropdown */
        .auth-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 240px;
            background: var(--card);
            border: 1px solid var(--card-edge);
            border-radius: 12px;
            padding: 16px 18px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-3px);
            transition: all 0.2s ease;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            z-index: 200;
        }
        .auth-panel.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .auth-panel .tabs {
            display: flex;
            gap: 3px;
            background: #f5f4f2;
            border-radius: 6px;
            padding: 2px;
            margin-bottom: 12px;
        }
        .auth-panel .tab {
            flex: 1;
            padding: 5px;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .tab.active {
            background: #fff;
            color: var(--blue);
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .auth-panel .fg {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .auth-panel .fg label {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            color: var(--text-muted);
            width: 14px;
            font-size: 12px;
        }
        .auth-panel .fi {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--card-edge);
            border-radius: 6px;
            background: #fafaf8;
            color: var(--text);
            font-size: 12px;
            outline: none;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .fi:focus {
            border-color: var(--blue);
            background: #fff;
        }
        .auth-panel .btn {
            width: 100%;
            padding: 7px;
            border: none;
            border-radius: 6px;
            background: var(--blue);
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 2px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .btn:hover { opacity: 0.9; }
        .auth-panel .ae {
            color: #e33;
            font-size: 11px;
            padding: 5px;
            background: #fef2f2;
            border-radius: 5px;
            margin-bottom: 6px;
            display: none;
        }
        .auth-panel .user-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
        }
        .auth-panel .user-row .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), #6da0f2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        .auth-panel .user-row .detail .name {
            font-weight: 600;
            font-size: 12px;
        }
        .auth-panel .user-row .detail .meta {
            font-size: 10px;
            color: var(--text-muted);
        }
        .auth-panel .signout {
            width: 100%;
            padding: 7px;
            border: 1px solid var(--card-edge);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .signout:hover {
            color: #e33;
            border-color: rgba(238,51,51,0.12);
        }

        /* ── main ── */
        .stage-page {
            max-width: 1020px;
            margin: 0 auto;
            padding: 10px 20px 44px;
        }

        /* ── header card ── */
        .stage-header {
            background: var(--card);
            border: 1px solid var(--card-edge);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 16px;
            align-items: stretch;
            box-shadow: var(--shadow);
            position: relative;
        }
        .header-left {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            font-family: "Noto Sans SC", sans-serif;
        }
        .back-link:hover {
            color: var(--text);
            gap: 8px;
        }
        .back-link i { font-size: 11px; }
        .header-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .stage-big-icon {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: var(--blue-soft);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .header-title h1 {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.2px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .header-title p {
            font-size: 11.5px;
            color: var(--text-secondary);
            margin-top: 0px;
        }
        .header-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 2px;
        }
        .header-stats > div {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }
        .stat-value {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            font-family: "Noto Sans SC", sans-serif;
        }
        .stat-label {
            font-size: 9.5px;
            color: var(--text-muted);
            font-weight: 500;
            margin-left: 1px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stars-display {
            display: flex;
            gap: 1px;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .stars-display .star-filled { color: #f5b342; }
        .stars-display .star-empty { color: #ddd8cf; }

        /* header right */
        .header-right {
            flex: 1;
            min-width: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            align-content: stretch;
        }
        .header-right .stat-block {
            background: #f8f7f4;
            border: 1px solid var(--card-edge);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s;
        }
        .header-right .stat-block:hover {
            border-color: rgba(79,133,230,0.08);
            background: #faf9f7;
        }
        .header-right .stat-block .num {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            font-family: "Noto Sans SC", sans-serif;
            line-height: 1.2;
        }
        .header-right .stat-block .num.green { color: var(--green); }
        .header-right .stat-block .num.blue { color: var(--blue); }
        .header-right .stat-block .num.amber { color: var(--amber); }
        .header-right .stat-block .label {
            font-size: 9.5px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 1px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .header-right .stat-block .icon {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 2px;
            opacity: 0.4;
        }
        .header-right .stat-block .icon.green { color: var(--green); opacity: 0.5; }
        .header-right .stat-block .icon.blue { color: var(--blue); opacity: 0.5; }
        .header-right .stat-block .icon.amber { color: var(--amber); opacity: 0.5; }

        /* ── phases ── */
        .phase {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 22px;
            margin-bottom: 16px;
            border: 1px solid var(--card-edge);
            box-shadow: var(--shadow);
        }
        .phase-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--card-edge);
            padding-bottom: 10px;
        }
        .phase-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 5px;
            background: var(--blue-soft);
            color: var(--blue);
            font-weight: 700;
            font-size: 11px;
            flex-shrink: 0;
            font-family: "Noto Sans SC", sans-serif;
        }
        .phase-header h2 {
            font-size: 15px;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
        }
        .phase-status {
            margin-left: auto;
            font-size: 10.5px;
            color: var(--text-muted);
            background: #f3f2ee;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-family: "Noto Sans SC", sans-serif;
        }
        .phase-status i { margin-right: 3px; font-size: 10px; }
        .phase-action {
            margin-left: 8px;
        }
        .phase-action .btn {
            font-size: 11px;
            padding: 5px 14px;
        }

        /* ── gallery ── */
        .word-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .gallery-card {
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--card-edge);
            overflow: hidden;
            padding: 8px 8px 10px;
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
        }
        .gallery-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            border-color: rgba(79,133,230,0.08);
        }
        .gallery-card video {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 5px;
            background: #f0eee8;
            display: block;
        }
        .gallery-word {
            font-weight: 600;
            font-size: 13px;
            margin: 8px 0 4px;
            text-align: center;
            font-family: "Noto Sans SC", sans-serif;
        }
        .gallery-tags {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 8.5px;
            font-weight: 600;
            padding: 1px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            background: #f0efea;
            color: var(--text-muted);
            font-family: "Noto Sans SC", sans-serif;
        }
        .tag-type {
            background: var(--blue-soft);
            color: var(--blue);
        }
        .mastered-tag {
            background: var(--green-soft);
            color: var(--green);
        }
        .new-tag {
            background: var(--amber-bg);
            color: var(--amber);
        }
        .gallery-card.mastered {
            border-color: rgba(59,158,114,0.08);
            background: rgba(59,158,114,0.005);
        }

        /* ── practice / test: left 3/5 video, right 2/5 options ── */
        .practice-area {
            max-width: 100%;
            margin: 0 auto;
        }
        .practice-layout {
            display: flex;
            gap: 16px;
            align-items: stretch;
        }
        .practice-left {
            flex: 0 0 60%;
            min-width: 0;
        }
        .practice-right {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .practice-video {
            border-radius: 8px;
            overflow: hidden;
            background: #f0eee8;
            aspect-ratio: 16 / 9;
            border: 1px solid var(--card-edge);
            position: relative;
        }
        .practice-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* 移除点击放大提示和功能 */
        .practice-video .click-hint {
            display: none;
        }
        .practice-progress-bar {
            height: 2px;
            background: #eeebe5;
            border-radius: 2px;
            overflow: hidden;
            margin: 0 0 8px 0;
        }
        .practice-progress-fill {
            height: 100%;
            background: var(--blue);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .practice-score {
            display: flex;
            justify-content: space-between;
            font-size: 10.5px;
            color: var(--text-secondary);
            padding: 0 2px;
            font-family: "Noto Sans SC", sans-serif;
            flex-shrink: 0;
        }
        .practice-score span {
            background: #f5f4f0;
            padding: 2px 10px;
            border-radius: 16px;
            font-weight: 500;
        }
        .practice-score span:first-child {
            background: var(--green-soft);
            color: var(--green);
        }
        .practice-score span:nth-child(2) {
            background: #fdf0ef;
            color: #d95555;
        }
        .practice-score span:last-child {
            background: var(--blue-soft);
            color: var(--blue);
        }
        .options-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .option-btn {
            padding: 10px 14px;
            border: 1px solid var(--card-edge);
            border-radius: 8px;
            background: var(--card);
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            font-family: "Noto Sans SC", sans-serif;
            text-align: left;
            flex: 1;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            background: #f8f7f4;
            border-color: #c8c4bd;
        }
        .option-btn.selected {
            border-color: var(--blue);
            background: var(--blue-soft);
        }
        .option-btn.correct-answer {
            border-color: var(--green);
            background: var(--green-soft);
        }
        .option-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }
        .feedback {
            margin: 6px 0 4px;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 11.5px;
            background: #f5f4f0;
            color: var(--text-secondary);
            font-family: "Noto Sans SC", sans-serif;
            flex-shrink: 0;
        }
        .feedback.correct {
            background: var(--green-soft);
            color: var(--green);
            border-left: 3px solid var(--green);
        }
        .feedback.wrong {
            background: #fdf0ef;
            color: #d95555;
            border-left: 3px solid #d95555;
        }
        .practice-nav {
            text-align: center;
            margin-top: 8px;
            flex-shrink: 0;
        }

        /* ── done ── */
        .practice-done {
            text-align: center;
            padding: 20px 16px 12px;
        }
        .result-icon {
            font-size: 36px;
            margin-bottom: 2px;
        }
        .practice-done h3 {
            font-size: 17px;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
            margin-bottom: 2px;
        }
        .practice-done p {
            color: var(--text-secondary);
            font-size: 12px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .xp-gain {
            font-weight: 600;
            color: var(--blue);
            font-size: 13px;
            margin: 4px 0 12px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .test-stars {
            font-size: 26px;
            letter-spacing: 4px;
            margin: 4px 0 8px;
        }
        .test-stars .result-star-filled { color: #f5b342; }
        .test-stars .result-star-empty { color: #ddd8cf; }
        .test-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 14px;
        }
        .test-actions a { text-decoration: none; }

        /* ── modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1a181c;
            max-width: 660px;
            width: 100%;
            position: relative;
            padding: 16px 16px 20px;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            font-family: "Noto Sans SC", sans-serif;
            z-index: 10;
        }
        .modal-close:hover { background: rgba(255,255,255,0.1); }
        .modal-video-wrap {
            aspect-ratio: 16 / 9;
            background: #0a0a0c;
            border-radius: 8px;
            overflow: hidden;
        }
        .modal-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .modal-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 4px 0;
            color: #fff;
            font-family: "Noto Sans SC", sans-serif;
        }
        .modal-info .word {
            font-size: 16px;
            font-weight: 700;
        }
        .modal-info .type {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            font-weight: 500;
        }
        .modal-nav {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .modal-nav button {
            flex: 1;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: "Noto Sans SC", sans-serif;
        }
        .modal-nav button:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }
        .modal-nav button:disabled {
            opacity: 0.2;
            cursor: default;
        }
        .modal-counter {
            color: rgba(255,255,255,0.25);
            font-size: 11px;
            font-weight: 500;
            padding: 0 4px;
            font-family: "Noto Sans SC", sans-serif;
        }

        /* ── responsive ── */
        @media (max-width: 820px) {
            .stage-header { flex-direction: column; }
            .header-left { flex: 1; }
            .header-right { grid-template-columns: 1fr 1fr 1fr; }
            .nav-bar { width: calc(100% - 16px); top: 10px; }
            .nav { padding: 6px 10px; border-radius: 24px; }
            .nav-links a { padding: 4px 8px; font-size: 10.5px; }
            .nav-links a span { display: none; }
            .stage-page { padding: 8px 12px 32px; }
            .phase { padding: 14px 14px; }
            .phase-action .btn { font-size: 10px; padding: 4px 10px; }
            .practice-layout { flex-direction: column; }
            .practice-left { flex: 1; }
            .practice-right { flex: 1; }
            .word-gallery { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .modal-overlay { padding: 16px; }
            .header-right .stat-block .num { font-size: 17px; }
            .header-right .stat-block { padding: 8px 10px; }
            .options-section { flex-direction: row; flex-wrap: wrap; }
            .option-btn { flex: 1 1 calc(50% - 3px); min-height: 38px; padding: 8px 12px; font-size: 11px; }
        }
        @media (max-width: 600px) {
            .header-right { grid-template-columns: 1fr 1fr; }
            .nav-links a { padding: 3px 6px; font-size: 10px; }
            .header-title h1 { font-size: 16px; }
            .stat-value { font-size: 15px; }
            .stage-header { padding: 12px 14px; }
            .phase { padding: 12px 12px; }
            .stage-big-icon { width: 34px; height: 34px; font-size: 16px; }
            .header-stats { gap: 10px; flex-wrap: wrap; }
            .modal-overlay { padding: 8px; }
            .modal-content { padding: 10px; }
            .header-right .stat-block .num { font-size: 15px; }

            .option-btn { flex: 1; min-height: 40px; }
            .practice-score { font-size: 10px; }
            .practice-score span { padding: 2px 8px; }

        @media (max-width: 480px) {
            .header-right { grid-template-columns: 1fr 1fr; }

            .header-right .stat-block .num { font-size: 14px; }
            .header-right .stat-block .label { font-size: 8px; }
            .header-right .stat-block .icon { font-size: 13px; }

</head>
<body>
    <!-- nav original style with Font Awesome -->
    <div class="nav-bar">

                        <button class="btn" id="authSubmitBtn">登录</button>

    </div>

    <main class="stage-page">
        <!-- header: 2/5 left + 3/5 right -->
        <div class="stage-header" id="stageHeader">
            <div class="header-left">
                <a href="/learn" class="back-link"><i class="fas fa-arrow-left"></i> 返回地图</a>
                <div class="header-main">
                    <span class="stage-big-icon" id="stageIcon">手</span>
                    <div class="header-title">

                        <p id="stageDesc" class="stage-desc-text"></p>

                <div class="header-stats">
                    <div><span class="stat-value" id="masteredCount">0</span><span class="stat-label">已掌握</span></div>
                    <div><span class="stat-value" id="wordCount">0</span><span class="stat-label">总词汇</span></div>
                    <div class="stars-display" id="starsDisplay">
                        <span class="star-empty">☆</span><span class="star-empty">☆</span><span class="star-empty">☆</span>
                    </div>

            </div>
            <div class="header-right" id="headerRight">
                <div class="stat-block">
                    <div class="icon blue"><i class="fas fa-clock"></i></div>
                    <div class="num blue" id="studyTime">0</div>
                    <div class="label">学习分钟</div>
                </div>
                <div class="stat-block">
                    <div class="icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="num green" id="accuracy">0%</div>

                </div>
                <div class="stat-block">
                    <div class="icon amber"><i class="fas fa-fire"></i></div>

        <!-- 阶段1: 浏览 -->
        <section class="phase" id="phaseExplore">
            <div class="phase-header">
                <span class="phase-num">1</span>
                <h2>浏览学习</h2>
                <span class="phase-status" id="exploreStatus"><i class="fas fa-play-circle"></i> 点击视频放大</span>
                <div class="phase-action">
                    <button id="startPracticeBtn" class="btn btn-primary" style="display:none"><i class="fas fa-arrow-right"></i> 进入练习</button>
                </div>
            </div>
            <div class="word-gallery" id="wordGallery"></div>
        </section>

        <!-- 阶段2: 练习 -->
        <section class="phase" id="phasePractice" style="display:none">
            <div class="phase-header">
                <span class="phase-num">2</span>
                <h2>练习闯关</h2>
                <span class="phase-status"><i class="fas fa-pencil"></i> 10道练习题</span>
            </div>
            <div class="practice-area" id="practiceArea">
                <div class="practice-layout">
                    <div class="practice-left">
                        <div class="practice-video" id="practiceVideoWrap">
                            <video id="practiceVideo" autoplay loop muted playsinline disablepictureinpicture>
                                <source src="" type="video/mp4">
                            </video>
                        </div>
                        <div class="practice-progress-bar">
                            <div class="practice-progress-fill" id="practiceProgress" style="width:0%"></div>
                        </div>
                    </div>
                    <div class="practice-right">
                        <div class="practice-score">
                            <span><i class="fas fa-check"></i> <span id="practiceCorrect">0</span></span>
                            <span><i class="fas fa-times"></i> <span id="practiceWrong">0</span></span>
                            <span>第 <span id="practiceNum">1</span>/<span id="practiceTotal">10</span> 题</span>
                        </div>
                        <div class="options-section" id="practiceOptions"></div>
                        <div class="feedback" id="practiceFeedback"></div>
                        <div class="practice-nav">
                            <button id="practiceNextBtn" class="btn btn-primary" style="display:none"><i class="fas fa-arrow-right"></i> 下一题</button>

                    </div>

            </div>

                <div class="result-icon"><i class="fas fa-check-circle" style="color:var(--green);"></i></div>
                <h3>练习完成</h3>
                <p>答对 <span id="practiceFinalCorrect">0</span>/<span id="practiceFinalTotal">10</span></p>
                <button id="startTestBtn" class="btn btn-primary"><i class="fas fa-arrow-right"></i> 进入考试</button>
                <button class="btn btn-secondary" onclick="retryPractice()"><i class="fas fa-rotate-left"></i> 重新练习</button>
            </div>
        </section>

        <!-- 阶段3: 考试 -->
        <section class="phase" id="phaseTest" style="display:none">
            <div class="phase-header">
                <span class="phase-num">3</span>
                <h2>阶段考试</h2>
                <span class="phase-status"><i class="fas fa-graduation-cap"></i> 10道题，60%通过</span>
            </div>
            <div class="practice-area" id="testArea">
                <div class="practice-layout">
                    <div class="practice-left">
                        <div class="practice-video" id="testVideoWrap">

                                <source src="" type="video/mp4">
                            </video>
                        </div>
                        <div class="practice-progress-bar">
                            <div class="practice-progress-fill" id="testProgress" style="width:0%"></div>
                        </div>
                    </div>
                    <div class="practice-right">
                        <div class="practice-score">
                            <span><i class="fas fa-check"></i> <span id="testCorrect">0</span></span>
                            <span><i class="fas fa-times"></i> <span id="testWrong">0</span></span>
                            <span>第 <span id="testNum">1</span>/<span id="testTotal">10</span> 题</span>

                        <div class="feedback" id="testFeedback"></div>
                        <div class="practice-nav">
                            <button id="testNextBtn" class="btn btn-primary" style="display:none"><i class="fas fa-arrow-right"></i> 下一题</button>

                    </div>

            </div>
            <div class="practice-done" id="testDone" style="display:none">
                <div class="result-icon" id="testResultIcon"><i class="fas fa-trophy" style="color:var(--amber);"></i></div>
                <h3 id="testResultTitle">考试完成</h3>
                <div class="test-stars" id="testStars"></div>
                <p id="testResultText">答对 0/10</p>
                <p id="testXpGain" class="xp-gain"><i class="fas fa-star"></i> 获得 0 XP</p>
                <div class="test-actions">
                    <button id="testReturnBtn" class="btn btn-primary"><i class="fas fa-map"></i> 返回地图</button>
                    <button class="btn btn-secondary" onclick="retryTest()"><i class="fas fa-rotate-left"></i> 重考</button>
                    <a href="/camera-game" class="btn btn-secondary"><i class="fas fa-camera"></i> 手势识别</a>
                    <a href="/learn/review" class="btn btn-secondary"><i class="fas fa-rotate-right"></i> 去复习</a>

    <!-- Modal -->
    <div class="modal-overlay" id="videoModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div class="modal-video-wrap">
                <video id="modalVideo" autoplay loop muted playsinline disablepictureinpicture>
                    <source src="" type="video/mp4">
                </video>
            </div>
            <div class="modal-info">
                <span class="word" id="modalWord">—</span>
                <span class="type" id="modalType">—</span>
            </div>
            <div class="modal-nav">
                <button id="modalPrev"><i class="fas fa-chevron-left"></i> 上一个</button>
                <span class="modal-counter" id="modalCounter">1 / 1</span>
                <button id="modalNext">下一个 <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        var currentUser = null;
        var stageId = parseInt(window.location.pathname.split("/").pop());
        var stageData = null;
        var practiceQuestions = [];
        var testQuestions = [];
        var practiceIndex = 0, testIndex = 0;
        var practiceCorrect = 0, practiceWrong = 0;
        var testCorrect = 0, testWrong = 0;
        var isAnswering = false;
        var BASE = "";
        var studyMinutes = 0;
        var studyInterval = null;

        // Modal state
        var modalWords = [];
        var modalIndex = 0;
        var modalOpen = false;

        // Auth
        document.addEventListener("auth:login", function(e) {
            currentUser = e.detail;
            if (!stageData) loadStage();
        });
        document.addEventListener("auth:logout", function() {
            currentUser = null;
            alert("请先登录");
            window.location.href = "/learning";
        });
        Auth.ready().then(function() {
            if (Auth.isLoggedIn()) {
                currentUser = Auth.getUser();
                loadStage();
            } else {
                alert("请先登录");
                window.location.href = "/learn";
            }
        });

        // Nav auth toggle
        var authOpen = false;
        document.getElementById("authToggleBtn").addEventListener("click", function(e) {
            e.stopPropagation();
            authOpen = !authOpen;
            document.getElementById("authDrop").classList.toggle("open", authOpen);
        });
        document.addEventListener("click", function(e) {
            var d = document.getElementById("authDrop");
            if (authOpen && !d.contains(e.target) && e.target !== document.getElementById("authToggleBtn")) {
                authOpen = false;
                d.classList.remove("open");
            }
        });

        // Auth tabs
        var authTab = "login";
        document.querySelectorAll(".tab").forEach(function(t) {
            t.addEventListener("click", function() {
                document.querySelectorAll(".tab").forEach(function(x) { x.classList.remove("active"); });
                t.classList.add("active");
                authTab = t.dataset.tab;
                document.getElementById("authSubmitBtn").textContent = authTab === "register" ? "注册" : "登录";
                document.getElementById("confirmGroup").style.display = authTab === "register" ? "flex" : "none";
                document.getElementById("authError").style.display = "none";
            });
        });

        document.getElementById("authSubmitBtn").addEventListener("click", async function() {
            var u = document.getElementById("authUsername").value.trim();
            var p = document.getElementById("authPassword").value;
            var e = document.getElementById("authError");
            var r;
            if (authTab === "register") {
                var c = document.getElementById("authConfirm").value;
                if (p !== c) { e.textContent = "两次密码不一致"; e.style.display = "block"; return; }
                r = await Auth.register(u, p, c);
            } else {
                r = await Auth.login(u, p);
            }
            if (r.error) { e.textContent = r.error; e.style.display = "block"; return; }
            authOpen = false;
            document.getElementById("authDrop").classList.remove("open");
            onAuth(r.user);
        });

        document.getElementById("logoutBtn").addEventListener("click", async function() {
            await Auth.logout();
            document.getElementById("authLoggedIn").style.display = "none";
            document.getElementById("authNotLoggedIn").style.display = "block";
        });

        function onAuth(u) {
            document.getElementById("authNotLoggedIn").style.display = "none";
            document.getElementById("authLoggedIn").style.display = "block";
            document.getElementById("userName").textContent = u.username;
            document.getElementById("userMeta").textContent = "Lv." + (u.level || 1) + " · " + (u.xp || 0) + " XP";
            currentUser = u;
            if (!stageData) loadStage();
        }

        // DOM ready
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("modalClose").addEventListener("click", closeModal);
            document.getElementById("videoModal").addEventListener("click", function(e) {
                if (e.target === this) closeModal();
            });
            document.getElementById("modalPrev").addEventListener("click", function() {
                if (modalIndex > 0) openModal(modalIndex - 1);
            });
            document.getElementById("modalNext").addEventListener("click", function() {
                if (modalIndex < modalWords.length - 1) openModal(modalIndex + 1);
            });
            document.addEventListener("keydown", function(e) {
                if (!modalOpen) return;
                if (e.key === "Escape") closeModal();
                if (e.key === "ArrowLeft" && modalIndex > 0) openModal(modalIndex - 1);
                if (e.key === "ArrowRight" && modalIndex < modalWords.length - 1) openModal(modalIndex + 1);
            });

            // Study timer
            if (studyInterval) clearInterval(studyInterval);
            studyInterval = setInterval(function() {
                studyMinutes++;
                document.getElementById("studyTime").textContent = studyMinutes;
            }, 60000);
        });

        function openModal(index) {
            if (!modalWords.length) return;
            modalIndex = Math.max(0, Math.min(index, modalWords.length - 1));
            var w = modalWords[modalIndex];
            var video = document.getElementById("modalVideo");
            var src = BASE + w.video_path;
            if (video.src !== src) {
                video.src = src;
                video.load();
                video.play();
            }
            document.getElementById("modalWord").textContent = w.word;
            document.getElementById("modalType").textContent = w.word_type || "词汇";
            document.getElementById("modalCounter").textContent = (modalIndex + 1) + " / " + modalWords.length;
            document.getElementById("modalPrev").disabled = modalIndex === 0;
            document.getElementById("modalNext").disabled = modalIndex === modalWords.length - 1;
            document.getElementById("videoModal").classList.add("active");
            modalOpen = true;
        }

        function closeModal() {
            document.getElementById("videoModal").classList.remove("active");
            modalOpen = false;
            var video = document.getElementById("modalVideo");
            video.pause();
        }

        async function loadStage() {
            if (!currentUser) return;
            var res = await fetch(BASE + "/api/learn/stage/" + stageId + "?user_id=" + currentUser.id);
            var data = await res.json();
            if (data.code !== 0) {
                alert(data.message);
                window.location.href = "/learn";
                return;
            }
            stageData = data.data;
            renderExplore();
        }

        function renderExplore() {
            var s = stageData.stage;
            document.getElementById("stageIcon").textContent = s.icon || "手";
            document.getElementById("stageName").textContent = s.name;
            document.getElementById("stageDesc").textContent = s.desc;

            var p = stageData.progress;
            document.getElementById("masteredCount").textContent = p.mastered;
            document.getElementById("wordCount").textContent = p.total_words;

            var sd = document.getElementById("starsDisplay");
            sd.innerHTML = "";
            for (var i = 0; i < 3; i++) {
                var sp = document.createElement("span");
                sp.className = i < p.stars ? "star-filled" : "star-empty";
                sp.textContent = "\u2605";
                sd.appendChild(sp);
            }

            modalWords = stageData.words.slice();

            // Right stats
            var total = p.total_words || 1;
            var acc = Math.round((p.mastered || 0) / total * 100);
            document.getElementById("accuracy").textContent = acc + "%";
            document.getElementById("streak").textContent = currentUser.streak || 0;
            document.getElementById("studyTime").textContent = studyMinutes || 0;

            // Gallery
            var gallery = document.getElementById("wordGallery");
            gallery.innerHTML = "";
            stageData.words.forEach(function(w, idx) {
                var card = document.createElement("div");
                card.className = "gallery-card" + (w.mastered ? " mastered" : "");
                card.innerHTML =
                    '<video src="' + BASE + w.video_path + '" muted loop playsinline disablepictureinpicture ' +
                    'onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>' +
                    '<div class="gallery-word">' + w.word + '</div>' +
                    '<div class="gallery-tags"><span class="tag tag-type">' + w.word_type + '</span>' +
                    (w.mastered ? '<span class="tag mastered-tag">已掌握</span>' : '<span class="tag new-tag">新词</span>') + '</div>';
                card.addEventListener("click", function() { openModal(idx); });
                gallery.appendChild(card);
            });

            var btn = document.getElementById("startPracticeBtn");
            btn.style.display = p.total_words > 0 ? "inline-flex" : "none";

            // 移除视频点击放大功能
            // setupVideoClick 不再绑定
        }

        document.getElementById("startPracticeBtn").addEventListener("click", function() {
            document.getElementById("phaseExplore").style.display = "none";
            document.getElementById("phasePractice").style.display = "block";
            startPractice();
        });

        async function startPractice() {
            practiceCorrect = 0;
            practiceWrong = 0;
            practiceIndex = 0;
            document.getElementById("practiceDone").style.display = "none";
            document.getElementById("practiceArea").style.display = "block";

            var res = await fetch(BASE + "/api/learn/quiz", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id: currentUser.id, stage_id: stageId, mode: "practice"})
            });
            var data = await res.json();
            if (data.code !== 0) return;
            practiceQuestions = data.data.questions;
            document.getElementById("practiceTotal").textContent = practiceQuestions.length;
            showPractice(0);
        }

        function showPractice(index) {
            if (index >= practiceQuestions.length) { finishPractice(); return; }
            isAnswering = false;
            var q = practiceQuestions[index];
            var video = document.getElementById("practiceVideo");
            video.src = BASE + q.video_path;
            video.load();
            video.play();

            document.getElementById("practiceNum").textContent = index + 1;
            document.getElementById("practiceProgress").style.width = (index / practiceQuestions.length * 100) + "%";
            document.getElementById("practiceFeedback").textContent = "";
            document.getElementById("practiceFeedback").className = "feedback";
            document.getElementById("practiceNextBtn").style.display = "none";

            var od = document.getElementById("practiceOptions");
            od.innerHTML = "";
            var labels = ["A", "B", "C", "D"];
            q.options.forEach(function(opt, i) {
                var btn = document.createElement("button");
                btn.className = "option-btn";
                btn.textContent = labels[i] + ". " + opt;
                btn.dataset.value = opt;
                btn.addEventListener("click", function() { submitPractice(opt, btn, index); });
                od.appendChild(btn);
            });
        }

        async function submitPractice(answer, btn, index) {
            if (isAnswering) return;
            isAnswering = true;
            var q = practiceQuestions[index];
            document.querySelectorAll("#practiceOptions .option-btn").forEach(function(b) { b.disabled = true; });
            if (btn) btn.classList.add("selected");

            var res = await fetch(BASE + "/api/learn/answer", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id: currentUser.id, question_id: q.question_id, answer: answer || "", stage_id: stageId, mode: "practice"})
            });
            var data = await res.json();
            if (data.code !== 0) return;

            var fb = document.getElementById("practiceFeedback");
            if (data.data.is_correct) {
                fb.textContent = "✓ 回答正确！";
                fb.className = "feedback correct";
                practiceCorrect++;
            } else {
                fb.textContent = "✗ 正确答案：" + data.data.correct_answer;
                fb.className = "feedback wrong";
                practiceWrong++;
            }
            document.getElementById("practiceCorrect").textContent = practiceCorrect;
            document.getElementById("practiceWrong").textContent = practiceWrong;

            document.querySelectorAll("#practiceOptions .option-btn").forEach(function(b) {
                if (b.dataset.value === q.correct_answer) b.classList.add("correct-answer");
            });

            document.getElementById("practiceNextBtn").style.display = "inline-flex";
            document.getElementById("practiceNextBtn").onclick = function() { showPractice(index + 1); };
        }

        function finishPractice() {
            document.getElementById("practiceArea").style.display = "none";
            document.getElementById("practiceDone").style.display = "block";
            document.getElementById("practiceFinalCorrect").textContent = practiceCorrect;
            document.getElementById("practiceFinalTotal").textContent = practiceCorrect + practiceWrong;
        }

        function retryPractice() {
            document.getElementById("practiceDone").style.display = "none";
            startPractice();
        }

        document.getElementById("startTestBtn").addEventListener("click", function() {
            document.getElementById("phasePractice").style.display = "none";
            document.getElementById("phaseTest").style.display = "block";
            startTest();
        });

        async function startTest() {
            testCorrect = 0;
            testWrong = 0;
            testIndex = 0;
            document.getElementById("testDone").style.display = "none";
            document.getElementById("testArea").style.display = "block";

            var res = await fetch(BASE + "/api/learn/quiz", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id: currentUser.id, stage_id: stageId, mode: "test"})
            });
            var data = await res.json();
            if (data.code !== 0) return;
            testQuestions = data.data.questions;
            document.getElementById("testTotal").textContent = testQuestions.length;
            showTest(0);
        }

        function showTest(index) {
            if (index >= testQuestions.length) { finishTest(); return; }
            isAnswering = false;
            var q = testQuestions[index];
            var video = document.getElementById("testVideo");
            video.src = BASE + q.video_path;
            video.load();
            video.play();

            document.getElementById("testNum").textContent = index + 1;
            document.getElementById("testProgress").style.width = (index / testQuestions.length * 100) + "%";
            document.getElementById("testFeedback").textContent = "";
            document.getElementById("testFeedback").className = "feedback";
            document.getElementById("testNextBtn").style.display = "none";

            var od = document.getElementById("testOptions");
            od.innerHTML = "";
            var labels = ["A", "B", "C", "D"];
            q.options.forEach(function(opt, i) {
                var btn = document.createElement("button");
                btn.className = "option-btn";
                btn.textContent = labels[i] + ". " + opt;
                btn.dataset.value = opt;
                btn.addEventListener("click", function() { submitTest(opt, btn, index); });
                od.appendChild(btn);
            });
        }

        async function submitTest(answer, btn, index) {
            if (isAnswering) return;
            isAnswering = true;
            var q = testQuestions[index];
            document.querySelectorAll("#testOptions .option-btn").forEach(function(b) { b.disabled = true; });
            if (btn) btn.classList.add("selected");

            var res = await fetch(BASE + "/api/learn/answer", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id: currentUser.id, question_id: q.question_id, answer: answer || "", stage_id: stageId, mode: "test"})
            });
            var data = await res.json();
            if (data.code !== 0) return;

            var fb = document.getElementById("testFeedback");
            if (data.data.is_correct) {
                fb.textContent = "✓ 回答正确！";
                fb.className = "feedback correct";
                testCorrect++;
            } else {
                fb.textContent = "✗ 正确答案：" + data.data.correct_answer;
                fb.className = "feedback wrong";
                testWrong++;
            }
            document.getElementById("testCorrect").textContent = testCorrect;
            document.getElementById("testWrong").textContent = testWrong;

            document.querySelectorAll("#testOptions .option-btn").forEach(function(b) {
                if (b.dataset.value === q.correct_answer) b.classList.add("correct-answer");
            });

            document.getElementById("testNextBtn").style.display = "inline-flex";
            document.getElementById("testNextBtn").onclick = function() { showTest(index + 1); };
        }

        async function finishTest() {
            document.getElementById("testArea").style.display = "none";
            document.getElementById("testDone").style.display = "block";

            var total = testCorrect + testWrong;
            document.getElementById("testFinalCorrect").textContent = testCorrect;
            document.getElementById("testFinalTotal").textContent = total;

            var res = await fetch(BASE + "/api/learn/stage/complete", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id: currentUser.id, stage_id: stageId, score: testCorrect, total: total})
            });
            var data = await res.json();
            if (data.code !== 0) return;

            var d = data.data;
            var sd = document.getElementById("testStars");
            sd.innerHTML = "";
            for (var i = 0; i < 3; i++) {
                var sp = document.createElement("span");
                sp.className = i < d.stars ? "result-star-filled" : "result-star-empty";
                sp.textContent = "\u2605";
                sd.appendChild(sp);
            }

            document.getElementById("testResultTitle").textContent = d.stars >= 2 ? "太棒了！" : (d.stars >= 1 ? "不错！" : "加油！");
            document.getElementById("testResultText").textContent = d.pct + "% 正确率 (" + d.score + "/" + d.total + ")";
            document.getElementById("testXpGain").innerHTML = '<i class="fas fa-star"></i> 获得 ' + d.xp_reward + ' XP';
            document.getElementById("testResultIcon").innerHTML = d.stars >= 2 ? '<i class="fas fa-trophy" style="color:var(--amber);"></i>' : '<i class="fas fa-star" style="color:var(--blue);"></i>';
        }

        function retryTest() {
            document.getElementById("testDone").style.display = "none";
            startTest();
        }

        document.getElementById("testReturnBtn").addEventListener("click", function() {
            window.location.href = "/learn";
        });
    </script>
</body>
</html>
