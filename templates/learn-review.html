<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复习 · 手语星球</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --page: #f5f3f0;
            --card: #ffffff;
            --card-edge: rgba(0,0,0,0.05);
            --text: #1a1720;
            --text-secondary: #6c6878;
            --text-muted: #a8a3b0;
            --blue: #4f85e6;
            --blue-soft: #f0f4fe;
            --green: #3b9e72;
            --green-soft: #edf8f2;
            --amber: #c89030;
            --amber-bg: #fdf6e8;
            --rose: #d95555;
            --rose-light: #fdf0ef;
            --radius: 10px;
            --shadow: 0 1px 2px rgba(0,0,0,0.03), 0 2px 12px rgba(0,0,0,0.02);
            --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.03);
        }
        body {
            font-family: "Noto Sans SC", -apple-system, sans-serif;
            background: var(--page);
            color: var(--text);
            font-size: 13px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding-top: 72px;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: radial-gradient(rgba(79,133,230,0.035) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d5d0c8; border-radius: 3px; }

        /* ── buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 7px 18px;
            border: none;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 600;
            font-family: "Noto Sans SC", sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            letter-spacing: 0.01em;
        }
        .btn-primary {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 1px 4px rgba(79,133,230,0.15);
        }
        .btn-primary:hover {
            background: #3d72d4;
            box-shadow: 0 2px 12px rgba(79,133,230,0.2);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #f0efea;
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            background: #e6e5de;
        }
        .btn-sm {
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--card-edge);
            background: var(--card);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: "Noto Sans SC", sans-serif;
        }
        .btn-sm:hover {
            background: #f0efea;
            border-color: #c8c4bd;
        }

        /* ── nav ── */
        .nav-bar {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: calc(100% - 32px);
            max-width: 1060px;
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 16px;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 40px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.02);
        }
        .nav-home {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            font-family: "Noto Sans SC", sans-serif;
        }
        .nav-home .dot {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #fff;
        }
        .nav-home .sub {
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 1px;
        }
        .nav-links {
            display: flex;
            gap: 1px;
        }
        .nav-links a {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            font-family: "Noto Sans SC", sans-serif;
        }
        .nav-links a:hover {
            color: var(--text);
            background: rgba(0,0,0,0.02);
        }
        .nav-links a.active {
            color: var(--blue);
            background: var(--blue-soft);
        }
        .nav-links a i {
            font-size: 12px;
            opacity: 0.5;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .nav-right .usr-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(0,0,0,0.03);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 13px;
        }
        .nav-right .usr-btn:hover {
            background: rgba(0,0,0,0.06);
            color: var(--text);
        }

        /* auth dropdown */
        .auth-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 240px;
            background: var(--card);
            border: 1px solid var(--card-edge);
            border-radius: 12px;
            padding: 16px 18px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-3px);
            transition: all 0.2s ease;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            z-index: 200;
        }
        .auth-panel.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .auth-panel .tabs {
            display: flex;
            gap: 3px;
            background: #f5f4f2;
            border-radius: 6px;
            padding: 2px;
            margin-bottom: 12px;
        }
        .auth-panel .tab {
            flex: 1;
            padding: 5px;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .tab.active {
            background: #fff;
            color: var(--blue);
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .auth-panel .fg {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .auth-panel .fg label {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            color: var(--text-muted);
            width: 14px;
            font-size: 12px;
        }
        .auth-panel .fi {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--card-edge);
            border-radius: 6px;
            background: #fafaf8;
            color: var(--text);
            font-size: 12px;
            outline: none;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .fi:focus {
            border-color: var(--blue);
            background: #fff;
        }
        .auth-panel .btn {
            width: 100%;
            padding: 7px;
            border: none;
            border-radius: 6px;
            background: var(--blue);
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 2px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .btn:hover { opacity: 0.9; }
        .auth-panel .ae {
            color: #e33;
            font-size: 11px;
            padding: 5px;
            background: #fef2f2;
            border-radius: 5px;
            margin-bottom: 6px;
            display: none;
        }
        .auth-panel .user-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
        }
        .auth-panel .user-row .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), #6da0f2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        .auth-panel .user-row .detail .name {
            font-weight: 600;
            font-size: 12px;
        }
        .auth-panel .user-row .detail .meta {
            font-size: 10px;
            color: var(--text-muted);
        }
        .auth-panel .signout {
            width: 100%;
            padding: 7px;
            border: 1px solid var(--card-edge);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            font-family: "Noto Sans SC", sans-serif;
        }
        .auth-panel .signout:hover {
            color: #e33;
            border-color: rgba(238,51,51,0.12);
        }

        /* ── main ── */
        .review-page {
            max-width: 1060px;
            margin: 0 auto;
            padding: 10px 20px 44px;
        }

        /* ── 复习菜单栏 ── */
        .review-menu {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 24px;
            border: 1px solid var(--card-edge);
            box-shadow: var(--shadow-card);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .review-menu-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .review-menu-left .icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--blue-soft);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .review-menu-left .title-wrap h2 {
            font-size: 16px;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
            letter-spacing: -0.2px;
        }
        .review-menu-left .title-wrap p {
            font-size: 12px;
            color: var(--text-muted);
            font-family: "Noto Sans SC", sans-serif;
        }
        .review-menu-right {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 5px 14px;
            border: 1px solid var(--card-edge);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 11.5px;
            font-weight: 500;
            font-family: "Noto Sans SC", sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn:hover {
            border-color: #c8c4bd;
            background: #f8f7f4;
        }
        .mode-btn.active {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
            box-shadow: 0 2px 8px rgba(79,133,230,0.2);
        }
        .mode-btn i {
            margin-right: 4px;
            font-size: 11px;
        }

        /* ── 复习卡片 ── */
        .review-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 24px 24px;
            border: 1px solid var(--card-edge);
            box-shadow: var(--shadow-card);
        }

        /* ── flashcard ── */
        .flashcard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .flashcard {
            width: 100%;
            max-width: 480px;
            background: #f8f7f4;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--card-edge);
        }
        .flashcard-video {
            aspect-ratio: 16 / 9;
            background: #f0eee8;
            overflow: hidden;
        }
        .flashcard-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .flashcard-word {
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            padding: 14px 20px 6px;
            font-family: "Noto Sans SC", sans-serif;
            letter-spacing: -0.5px;
        }
        .flashcard-info {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding-bottom: 14px;
        }
        .flashcard-info .tag {
            font-size: 9.5px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
            background: #f0efea;
            color: var(--text-muted);
            font-family: "Noto Sans SC", sans-serif;
        }
        .flashcard-info .tag.type {
            background: var(--blue-soft);
            color: var(--blue);
        }
        .flashcard-info .tag.cat {
            background: var(--amber-bg);
            color: var(--amber);
        }

        .flashcard-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 480px;
        }
        .flashcard-progress {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            font-family: "Noto Sans SC", sans-serif;
        }
        .flashcard-progress span {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 13px;
        }
        .fc-buttons {
            display: flex;
            gap: 8px;
        }
        .fc-btn {
            flex: 1;
            padding: 7px 12px;
            border: none;
            border-radius: var(--radius);
            font-size: 11.5px;
            font-weight: 600;
            font-family: "Noto Sans SC", sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .fc-btn:hover {
            transform: translateY(-1px);
        }
        .fc-pass {
            background: var(--green-soft);
            color: var(--green);
        }
        .fc-pass:hover {
            background: #d4f0e2;
        }
        .fc-fail {
            background: var(--rose-light);
            color: var(--rose);
        }
        .fc-fail:hover {
            background: #f5ddd9;
        }
        .fc-shuffle {
            background: #f0efea;
            color: var(--text-secondary);
            flex: 0.5;
        }
        .fc-shuffle:hover {
            background: #e6e5de;
        }

        .flashcard-done {
            text-align: center;
            padding: 24px 16px;
        }
        .flashcard-done .result-icon {
            font-size: 42px;
            margin-bottom: 2px;
        }
        .flashcard-done h3 {
            font-size: 18px;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
        }
        .flashcard-done p {
            color: var(--text-secondary);
            font-size: 12.5px;
            margin: 2px 0 14px;
            font-family: "Noto Sans SC", sans-serif;
        }

        /* ── review quiz: left 4/5 video, right 1/5 options ── */
        .review-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--card-edge);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .review-stats span {
            font-size: 11.5px;
            color: var(--text-secondary);
            font-family: "Noto Sans SC", sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .review-stats span i {
            font-size: 12px;
        }
        .review-stats span:first-child i { color: var(--green); }
        .review-stats span:nth-child(2) i { color: var(--rose); }
        .review-stats span:last-child i { color: var(--blue); }
        .review-stats span b {
            color: var(--text);
            font-weight: 700;
            font-size: 14px;
            min-width: 18px;
        }

        .review-body {
            display: flex;
            gap: 14px;
            min-height: 300px;
        }

        /* video - 4/5 */
        .review-video-wrap {
            flex: 0 0 80%;
            border-radius: 8px;
            overflow: hidden;
            background: #f0eee8;
            aspect-ratio: 16 / 9;
            border: 1px solid var(--card-edge);
            position: relative;
        }
        .review-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .video-hint-text {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            color: rgba(255,255,255,0.7);
            font-size: 10.5px;
            padding: 3px 14px;
            border-radius: 16px;
            font-family: "Noto Sans SC", sans-serif;
            pointer-events: none;
            white-space: nowrap;
        }
        .video-hint-text i {
            margin-right: 4px;
        }

        /* options - 1/5 */
        .review-options-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .review-options-wrap .options-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .review-options-wrap .option-btn {
            padding: 8px 12px;
            border: 1px solid var(--card-edge);
            border-radius: 6px;
            background: var(--card);
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            font-family: "Noto Sans SC", sans-serif;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 36px;
            flex: 1;
        }
        .review-options-wrap .option-btn:hover:not(:disabled) {
            background: #f8f7f4;
            border-color: #c8c4bd;
            transform: translateX(2px);
        }
        .review-options-wrap .option-btn .label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: #f0efea;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .review-options-wrap .option-btn:hover:not(:disabled) .label {
            background: #e6e5de;
        }
        .review-options-wrap .option-btn.selected {
            border-color: var(--blue);
            background: var(--blue-soft);
        }
        .review-options-wrap .option-btn.selected .label {
            background: var(--blue);
            color: #fff;
        }
        .review-options-wrap .option-btn.correct-answer {
            border-color: var(--green);
            background: var(--green-soft);
        }
        .review-options-wrap .option-btn.correct-answer .label {
            background: var(--green);
            color: #fff;
        }
        .review-options-wrap .option-btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none !important;
        }

        .review-feedback-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .review-feedback-wrap .feedback {
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: 500;
            font-size: 11px;
            background: #f5f4f0;
            color: var(--text-secondary);
            font-family: "Noto Sans SC", sans-serif;
            min-height: 28px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--card-edge);
        }
        .review-feedback-wrap .feedback.correct {
            background: var(--green-soft);
            color: var(--green);
            border-color: rgba(59,158,114,0.2);
        }
        .review-feedback-wrap .feedback.wrong {
            background: var(--rose-light);
            color: var(--rose);
            border-color: rgba(217,85,85,0.2);
        }
        .review-feedback-wrap .feedback i {
            font-size: 12px;
        }
        .review-nav {
            display: flex;
            gap: 5px;
        }
        .review-nav .btn {
            flex: 1;
            padding: 5px 12px;
            font-size: 11px;
            border-radius: 5px;
        }

        .review-done {
            text-align: center;
            padding: 20px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .review-done .result-icon {
            font-size: 38px;
        }
        .review-done h3 {
            font-size: 17px;
            font-weight: 700;
            font-family: "Noto Sans SC", sans-serif;
        }
        .review-done p {
            color: var(--text-secondary);
            font-size: 12.5px;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-muted);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .empty-state i {
            font-size: 32px;
            opacity: 0.3;
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 13px;
        }

        /* ── responsive ── */
        @media (max-width: 820px) {
            .review-menu {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 14px 16px;
            }
            .review-menu-left {
                gap: 10px;
            }
            .review-menu-left .title-wrap h2 {
                font-size: 14px;
            }
            .review-menu-left .title-wrap p {
                font-size: 11px;
            }
            .review-menu-right {
                justify-content: center;
            }
            .mode-btn {
                font-size: 10.5px;
                padding: 4px 10px;
            }
            .review-body {
                flex-direction: column;
                min-height: auto;
            }
            .review-video-wrap {
                flex: 1;
                aspect-ratio: 16 / 9;
            }
            .review-options-wrap {
                flex: 1;
                min-height: 160px;
            }
            .review-options-wrap .options-section {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .review-options-wrap .option-btn {
                flex: 1 1 calc(50% - 3px);
                min-height: 32px;
                padding: 6px 10px;
                font-size: 11px;
            }
            .review-options-wrap .option-btn:hover:not(:disabled) {
                transform: none;
            }
            .nav-bar {
                width: calc(100% - 16px);
                top: 10px;
            }
            .nav {
                padding: 6px 10px;
                border-radius: 24px;
            }
            .nav-links a {
                padding: 4px 8px;
                font-size: 10.5px;
            }
            .nav-links a span {
                display: none;
            }
            body {
                padding-top: 68px;
            }
            .review-page {
                padding: 8px 12px 32px;
            }
            .review-card {
                padding: 14px 14px 18px;
            }
            .flashcard-word {
                font-size: 22px;
            }
        }
        @media (max-width: 600px) {
            .review-menu {
                padding: 12px 14px;
            }
            .review-menu-left .icon-wrap {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
            .review-menu-left .title-wrap h2 {
                font-size: 13px;
            }
            .review-menu-left .title-wrap p {
                font-size: 10.5px;
            }
            .mode-btn {
                font-size: 10px;
                padding: 3px 8px;
            }
            .review-stats {
                gap: 12px;
                font-size: 10.5px;
            }
            .review-stats span b {
                font-size: 12px;
            }
            .review-body {
                flex-direction: column;
            }
            .review-video-wrap {
                aspect-ratio: 16 / 9;
            }
            .review-options-wrap .options-section {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .review-options-wrap .option-btn {
                flex: 1 1 calc(50% - 3px);
                font-size: 10.5px;
                padding: 5px 8px;
                min-height: 28px;
            }
            .review-options-wrap .option-btn .label {
                width: 16px;
                height: 16px;
                font-size: 8px;
            }
            .review-nav {
                flex-direction: column;
            }
            .review-nav .btn {
                flex: 1;
            }
            .review-card {
                padding: 10px 10px 14px;
            }
            .flashcard {
                max-width: 100%;
            }
            .flashcard-word {
                font-size: 20px;
                padding: 10px 16px 4px;
            }
            .fc-buttons {
                flex-wrap: wrap;
            }
            .fc-btn {
                flex: 1;
                min-width: 50px;
                padding: 5px 8px;
                font-size: 10.5px;
            }
            .fc-shuffle {
                flex: 0.5;
            }
            .video-hint-text {
                font-size: 9px;
                padding: 2px 10px;
            }
        }
        @media (max-width: 480px) {
            .nav-links a {
                padding: 3px 5px;
                font-size: 9px;
            }
            .nav-links a i {
                font-size: 10px;
            }
            .review-menu-left .title-wrap h2 {
                font-size: 12px;
            }
            .review-menu-left .title-wrap p {
                font-size: 10px;
            }
            .mode-btn {
                font-size: 9px;
                padding: 2px 6px;
            }
            .mode-btn i {
                margin-right: 2px;
                font-size: 9px;
            }
            .review-stats {
                gap: 6px;
                font-size: 9px;
            }
            .review-stats span b {
                font-size: 10px;
                min-width: 14px;
            }
            .review-options-wrap .option-btn {
                font-size: 9.5px;
                padding: 4px 6px;
                min-height: 24px;
                gap: 4px;
            }
            .review-options-wrap .option-btn .label {
                width: 14px;
                height: 14px;
                font-size: 7px;
            }
            .flashcard-word {
                font-size: 17px;
            }
            .review-card {
                padding: 8px 8px 12px;
            }
            .video-hint-text {
                font-size: 8px;
                padding: 1px 8px;
                bottom: 6px;
            }
        }
    </style>
</head>
<body>
    <!-- nav -->
    <div class="nav-bar">
        <nav class="nav">
            <a href="/" class="nav-home">
                <div class="dot">🤟</div>
                手语星球<span class="sub">Sign</span>
            </a>
            <div class="nav-links">
                <a href="/"><i class="fas fa-home"></i><span>首页</span></a>
                <a href="/game"><i class="fas fa-gamepad"></i><span>游戏</span></a>
                <a href="/learning"><i class="fas fa-library"></i><span>词库</span></a>
                <a href="/learn"><i class="fas fa-book-open"></i><span>学习</span></a>
                <a href="/camera-game"><i class="fas fa-camera"></i><span>AI手势镜</span></a>
                <a href="/learn/review" class="active"><i class="fas fa-rotate-right"></i><span>复习</span></a>
            </div>
            <div class="nav-right">
                <button class="usr-btn" id="authToggleBtn"><i class="fas fa-user"></i></button>
                <div class="auth-panel" id="authDrop">
                    <div id="authNotLoggedIn">
                        <div class="tabs"><button class="tab active" data-tab="login">登录</button><button class="tab" data-tab="register">注册</button></div>
                        <div class="ae" id="authError"></div>
                        <div class="fg"><label><i class="fas fa-user"></i></label><input type="text" id="loginUsername" class="fi" placeholder="用户名" maxlength="20"></div>
                        <div class="fg"><label><i class="fas fa-lock"></i></label><input type="password" id="loginPassword" class="fi" placeholder="密码"></div>
                        <div class="fg" id="confirmGroup" style="display:none"><label><i class="fas fa-shield"></i></label><input type="password" id="authConfirm" class="fi" placeholder="确认密码"></div>
                        <button class="btn" id="authSubmitBtn">登录</button>
                    </div>
                    <div id="authLoggedIn" style="display:none">
                        <div class="user-row"><div class="avatar">🤟</div><div class="detail"><div class="name" id="userName">用户</div><div class="meta" id="userMeta">Lv.1 · 0 XP</div></div></div>
                        <button class="signout" id="logoutBtn">退出</button>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <main class="review-page">
        <!-- 复习菜单栏 -->
        <div class="review-menu">
            <div class="review-menu-left">
                <div class="icon-wrap"><i class="fas fa-rotate-right"></i></div>
                <div class="title-wrap">
                    <h2>复习模式</h2>
                    <p>根据学习记录智能出题，巩固记忆</p>
                </div>
            </div>
            <div class="review-menu-right">
                <button class="mode-btn" data-mode="weak"><i class="fas fa-heart-broken"></i> 薄弱词</button>
                <button class="mode-btn active" data-mode="all"><i class="fas fa-list"></i> 全部</button>
                <button class="mode-btn" data-mode="mastered"><i class="fas fa-check-circle"></i> 已掌握</button>
                <button class="mode-btn" data-mode="flashcard"><i class="fas fa-id-card"></i> 闪卡</button>
            </div>
        </div>

        <!-- 复习卡片 -->
        <div class="review-card">
            <!-- 闪卡内容 -->
            <div id="flashcardArea" style="display:none">
                <div class="flashcard-container">
                    <div class="flashcard" id="flashcard">
                        <div class="flashcard-video">
                            <video id="flashcardVideo" autoplay loop muted playsinline disablepictureinpicture>
                                <source src="" type="video/mp4">
                            </video>
                        </div>
                        <div class="flashcard-word" id="flashcardWord">?</div>
                        <div class="flashcard-info">
                            <span class="tag type" id="flashcardType"></span>
                            <span class="tag cat" id="flashcardCat"></span>
                        </div>
                    </div>
                    <div class="flashcard-controls">
                        <div class="flashcard-progress">第 <span id="fcCurrent">0</span> / <span id="fcTotal">0</span></div>
                        <div class="fc-buttons">
                            <button class="fc-btn fc-fail" id="fcFail"><i class="fas fa-times"></i> 没记住</button>
                            <button class="fc-btn fc-shuffle" id="fcShuffle"><i class="fas fa-random"></i></button>
                            <button class="fc-btn fc-pass" id="fcPass"><i class="fas fa-check"></i> 记住了</button>
                        </div>
                    </div>
                </div>
                <div class="flashcard-done" id="flashcardDone" style="display:none">
                    <div class="result-icon">🎉</div>
                    <h3>复习完成</h3>
                    <p>本次复习了 <span id="fcReviewed">0</span> 个词汇</p>
                    <button class="btn btn-primary" onclick="loadFlashcards()"><i class="fas fa-rotate-left"></i> 再来一轮</button>
                </div>
            </div>

            <!-- 答题内容 -->
            <div id="reviewQuiz">
                <div class="review-stats">
                    <span><i class="fas fa-check-circle"></i> 正确 <b id="reviewCorrect">0</b></span>
                    <span><i class="fas fa-times-circle"></i> 错误 <b id="reviewWrong">0</b></span>
                    <span><i class="fas fa-list-ol"></i> 第 <b id="reviewNum">0</b> / <b id="reviewTotal">0</b> 题</span>
                </div>
                <div class="review-body">
                    <div class="review-video-wrap" id="reviewVideoContainer">
                        <video id="reviewVideo" autoplay loop muted playsinline disablepictureinpicture>
                            <source src="" type="video/mp4">
                        </video>
                        <div class="video-hint-text"><i class="fas fa-play"></i> 观看手势</div>
                    </div>
                    <div class="review-options-wrap">
                        <div class="options-section" id="reviewOptions"></div>
                        <div class="review-feedback-wrap">
                            <div class="feedback" id="reviewFeedback"><i class="fas fa-lightbulb"></i> 选择一个选项</div>
                            <div class="review-nav">
                                <button id="reviewNextBtn" class="btn btn-primary" style="display:none"><i class="fas fa-arrow-right"></i> 下一题</button>
                                <button id="reviewMoreBtn" class="btn btn-secondary" style="display:none"><i class="fas fa-rotate-left"></i> 再来一轮</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script>
        var currentUser = null;
        var reviewWords = [];
        var reviewIndex = 0, reviewCorrect = 0, reviewWrong = 0;
        var currentMode = "all";
        var isAnswering = false;
        var flashcardWords = [], flashcardIndex = 0, flashcardReviewed = 0;
        var BASE = "";

        // Auth
        document.addEventListener("auth:login", function(e) {
            currentUser = e.detail;
            document.getElementById("userBadge").textContent = currentUser.username + " Lv." + (currentUser.level || 1);
        });
        document.addEventListener("auth:logout", function() { currentUser = null; });

        Auth.ready().then(function() {
            if (Auth.isLoggedIn()) {
                currentUser = Auth.getUser();
                var badge = document.getElementById("userBadge");
                if (badge) badge.textContent = currentUser.username + " Lv." + (currentUser.level || 1);
            }
        });

        // Nav auth
        var authOpen = false;
        document.getElementById("authToggleBtn").addEventListener("click", function(e) {
            e.stopPropagation();
            authOpen = !authOpen;
            document.getElementById("authDrop").classList.toggle("open", authOpen);
        });
        document.addEventListener("click", function(e) {
            var d = document.getElementById("authDrop");
            if (authOpen && !d.contains(e.target) && e.target !== document.getElementById("authToggleBtn")) {
                authOpen = false;
                d.classList.remove("open");
            }
        });

        var authTab = "login";
        document.querySelectorAll(".tab").forEach(function(t) {
            t.addEventListener("click", function() {
                document.querySelectorAll(".tab").forEach(function(x) { x.classList.remove("active"); });
                t.classList.add("active");
                authTab = t.dataset.tab;
                document.getElementById("authSubmitBtn").textContent = authTab === "register" ? "注册" : "登录";
                document.getElementById("confirmGroup").style.display = authTab === "register" ? "flex" : "none";
                document.getElementById("authError").style.display = "none";
            });
        });

        document.getElementById("authSubmitBtn").addEventListener("click", async function() {
            var u = document.getElementById("loginUsername").value.trim();
            var p = document.getElementById("loginPassword").value;
            var e = document.getElementById("authError");
            var r;
            if (authTab === "register") {
                var c = document.getElementById("authConfirm").value;
                if (p !== c) { e.textContent = "两次密码不一致"; e.style.display = "block"; return; }
                r = await Auth.register(u, p, c);
            } else {
                r = await Auth.login(u, p);
            }
            if (r.error) { e.textContent = r.error; e.style.display = "block"; return; }
            authOpen = false;
            document.getElementById("authDrop").classList.remove("open");
            currentUser = r.user;
            document.getElementById("authNotLoggedIn").style.display = "none";
            document.getElementById("authLoggedIn").style.display = "block";
            document.getElementById("userName").textContent = r.user.username;
            document.getElementById("userMeta").textContent = "Lv." + (r.user.level || 1) + " · " + (r.user.xp || 0) + " XP";
        });

        document.getElementById("logoutBtn").addEventListener("click", async function() {
            await Auth.logout();
            document.getElementById("authLoggedIn").style.display = "none";
            document.getElementById("authNotLoggedIn").style.display = "block";
            currentUser = null;
        });

        // Login/Register buttons in nav
        document.addEventListener("DOMContentLoaded", function() {
            var loginBtn = document.getElementById("loginBtn");
            var registerBtn = document.getElementById("registerBtn");
            var logoutBtn = document.getElementById("logoutBtn");
            if (loginBtn) {
                loginBtn.addEventListener("click", async function() {
                    var u = document.getElementById("loginUsername").value.trim();
                    var p = document.getElementById("loginPassword").value;
                    var r = await Auth.login(u, p);
                    if (r.error) alert(r.error);
                });
            }
            if (registerBtn) {
                registerBtn.addEventListener("click", function() { Auth.showAuthModal("register"); });
            }
            if (logoutBtn) {
                logoutBtn.addEventListener("click", async function() { await Auth.logout(); });
            }
        });

        // 模式切换 - 使用菜单栏中的按钮
        document.querySelectorAll(".mode-btn").forEach(function(btn) {
            btn.addEventListener("click", function() {
                document.querySelectorAll(".mode-btn").forEach(function(b) { b.classList.remove("active"); });
                btn.classList.add("active");
                currentMode = btn.dataset.mode;
                document.getElementById("flashcardArea").style.display = currentMode === "flashcard" ? "block" : "none";
                document.getElementById("reviewQuiz").style.display = currentMode === "flashcard" ? "none" : "block";
                if (currentMode === "flashcard") loadFlashcards();
                else loadReview();
            });
        });

        async function loadReview() {
            if (!currentUser) return;
            var res = await fetch(BASE + "/api/learn/review/words?user_id=" + currentUser.id + "&mode=" + currentMode + "&count=20");
            var data = await res.json();
            if (data.code !== 0) return;

            reviewWords = data.data.words;
            reviewIndex = 0; reviewCorrect = 0; reviewWrong = 0;

            if (reviewWords.length === 0) {
                document.getElementById("reviewVideoContainer").style.display = "none";
                document.getElementById("reviewOptions").innerHTML = '<div class="empty-state"><i class="fas fa-smile"></i><p>没有需要复习的词汇</p></div>';
                document.getElementById("reviewNextBtn").style.display = "none";
                document.getElementById("reviewMoreBtn").style.display = "none";
                document.getElementById("reviewFeedback").innerHTML = '<i class="fas fa-info-circle"></i> 暂无复习内容';
                return;
            }

            document.getElementById("reviewVideoContainer").style.display = "block";
            document.getElementById("reviewTotal").textContent = reviewWords.length;
            document.getElementById("reviewNextBtn").style.display = "none";
            document.getElementById("reviewMoreBtn").style.display = "none";
            showReview(0);
        }

        function showReview(index) {
            if (index >= reviewWords.length) { finishReview(); return; }
            isAnswering = false;
            var w = reviewWords[index];

            document.getElementById("reviewNum").textContent = index + 1;
            document.getElementById("reviewCorrect").textContent = reviewCorrect;
            document.getElementById("reviewWrong").textContent = reviewWrong;
            document.getElementById("reviewFeedback").innerHTML = '<i class="fas fa-lightbulb"></i> 选择一个选项';
            document.getElementById("reviewFeedback").className = "feedback";
            document.getElementById("reviewNextBtn").style.display = "none";

            var video = document.getElementById("reviewVideo");
            video.src = BASE + (w.video_path || "");
            video.load();
            video.play();

            // 生成选项
            var correctAnswer = w.word;
            var wrongs = [];
            for (var i = 0; i < reviewWords.length; i++) {
                if (reviewWords[i].word !== correctAnswer && wrongs.length < 3) {
                    wrongs.push(reviewWords[i].word);
                }
            }
            var extras = ["好","坏","大","小","高","低","快","慢","多","少","爱","恨","喜欢","讨厌","开心","难过","美丽","丑"];
            while (wrongs.length < 3) {
                var e = extras[Math.floor(Math.random() * extras.length)];
                if (wrongs.indexOf(e) === -1 && e !== correctAnswer) wrongs.push(e);
            }
            var options = [correctAnswer].concat(wrongs.slice(0, 3));
            for (var i = options.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = options[i]; options[i] = options[j]; options[j] = tmp;
            }

            var od = document.getElementById("reviewOptions");
            od.innerHTML = "";
            var labels = ["A", "B", "C", "D"];
            options.forEach(function(opt, i) {
                var btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = '<span class="label">' + labels[i] + '</span> ' + opt;
                btn.dataset.value = opt;
                btn.addEventListener("click", function() {
                    if (isAnswering) return;
                    isAnswering = true;
                    document.querySelectorAll("#reviewOptions .option-btn").forEach(function(b) { b.disabled = true; });
                    if (btn) btn.classList.add("selected");
                    var isCorrect = opt === correctAnswer;
                    if (isCorrect) reviewCorrect++; else reviewWrong++;
                    var fb = document.getElementById("reviewFeedback");
                    if (isCorrect) {
                        fb.innerHTML = '<i class="fas fa-check-circle"></i> 正确！';
                        fb.className = "feedback correct";
                    } else {
                        fb.innerHTML = '<i class="fas fa-times-circle"></i> 正确答案: ' + correctAnswer;
                        fb.className = "feedback wrong";
                    }
                    document.getElementById("reviewCorrect").textContent = reviewCorrect;
                    document.getElementById("reviewWrong").textContent = reviewWrong;
                    document.querySelectorAll("#reviewOptions .option-btn").forEach(function(b) {
                        if (b.dataset.value === correctAnswer) b.classList.add("correct-answer");
                    });
                    document.getElementById("reviewNextBtn").style.display = "inline-flex";
                    document.getElementById("reviewNextBtn").onclick = function() { showReview(reviewIndex + 1); };
                });
                od.appendChild(btn);
            });
        }

        function finishReview() {
            document.getElementById("reviewVideoContainer").style.display = "none";
            document.getElementById("reviewOptions").innerHTML = '<div class="review-done"><div class="result-icon">✅</div><h3>复习完成</h3><p>正确率: ' + reviewCorrect + '/' + (reviewCorrect + reviewWrong) + '</p></div>';
            document.getElementById("reviewNextBtn").style.display = "none";
            document.getElementById("reviewMoreBtn").style.display = "inline-flex";
            document.getElementById("reviewMoreBtn").onclick = function() { loadReview(); };
            document.getElementById("reviewFeedback").innerHTML = '<i class="fas fa-star"></i> 复习结束，继续加油！';
            document.getElementById("reviewFeedback").className = "feedback";
        }

        async function loadFlashcards() {
            if (!currentUser) return;
            var res = await fetch(BASE + "/api/learn/review/flashcards?user_id=" + currentUser.id + "&count=30");
            var data = await res.json();
            if (data.code !== 0) return;
            flashcardWords = data.data.words;
            flashcardIndex = 0; flashcardReviewed = 0;
            if (flashcardWords.length === 0) {
                document.getElementById("flashcardDone").style.display = "block";
                document.getElementById("flashcard").style.display = "none";
                return;
            }
            document.getElementById("flashcardDone").style.display = "none";
            document.getElementById("flashcard").style.display = "block";
            document.getElementById("fcTotal").textContent = flashcardWords.length;
            showFlashcard(0);
        }

        function showFlashcard(index) {
            if (index >= flashcardWords.length) { finishFlashcards(); return; }
            var w = flashcardWords[index];
            var video = document.getElementById("flashcardVideo");
            video.src = BASE + (w.video_path || "");
            video.load(); video.play();
            document.getElementById("flashcardWord").textContent = w.word;
            document.getElementById("flashcardType").textContent = w.word_type || "词汇";
            document.getElementById("flashcardCat").textContent = w.category || "全部";
            document.getElementById("fcCurrent").textContent = index + 1;
            flashcardIndex = index;
        }

        document.getElementById("fcPass").addEventListener("click", function() {
            flashcardReviewed++;
            showFlashcard(flashcardIndex + 1);
        });
        document.getElementById("fcFail").addEventListener("click", function() {
            flashcardReviewed++;
            showFlashcard(flashcardIndex + 1);
        });
        document.getElementById("fcShuffle").addEventListener("click", function() {
            for (var i = flashcardWords.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = flashcardWords[i];
                flashcardWords[i] = flashcardWords[j];
                flashcardWords[j] = tmp;
            }
            showFlashcard(0);
        });

        function finishFlashcards() {
            document.getElementById("flashcard").style.display = "none";
            document.getElementById("flashcardDone").style.display = "block";
            document.getElementById("fcReviewed").textContent = flashcardReviewed;
        }
    </script>
</body>
</html>
